<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Edit Profile</title>
<style>
:root {
    --primary: #4a90e2;
    --primary-dark: #357abd;
    --accent: #4CAF50;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --card: rgba(255, 255, 255, 0.9);
    --radius: 24px;
    --shadow: 0 12px 40px rgba(0,0,0,0.12);
    --safe-top: env(safe-area-inset-top, 34px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    outline: none;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e0f2f1 0%, #fce4ec 100%);
    color: var(--text);
    transition: background 0.3s ease;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    overflow: hidden;
}

body.dark {
    background: #1a1f2c !important;
    color: #e6edf3;
}

#app-container {
    width: min(92vw, 500px);
    height: min(90vh, 800px);
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    transition: var(--transition);
}

body.dark #app-container {
    background: rgba(30, 39, 53, 0.9);
    border: 1px solid rgba(255,255,255,0.1);
}

header {
    padding: clamp(1rem, 5vw, 1.5rem);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    z-index: 10;
}

body.dark header {
    border-bottom-color: rgba(255,255,255,0.05);
}

.header-title {
    font-size: 1.2rem;
    font-weight: 700;
}

.back-btn {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--primary);
    padding: 5px;
    display: flex;
    align-items: center;
}

.content {
    flex: 1;
    overflow-y: scroll;
    -webkit-overflow-scrolling: touch;
    padding: 1.5rem;
    scrollbar-width: none;
}

.content::-webkit-scrollbar {
    display: none;
}

.pfp-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2rem;
    position: relative;
}

.pfp-container {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    position: relative;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.pfp-container:active {
    transform: scale(0.95);
}

#pfp_image {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
}

body.dark #pfp_image {
    border-color: #2c3e50;
}

.pfp-overlay {
    position: absolute;
    bottom: 0;
    right: 0;
    background: var(--primary);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1.2rem;
    border: 3px solid white;
}

body.dark .pfp-overlay {
    border-color: #1a1f2c;
}

.input-group {
    margin-bottom: 1.5rem;
}

.input-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 0.5rem;
    margin-left: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.input-field {
    width: 100%;
    padding: 14px 18px;
    border-radius: 16px;
    border: 1.5px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.5);
    font-size: 1rem;
    color: var(--text);
    transition: var(--transition);
}

body.dark .input-field {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.1);
    color: white;
}

.input-field:focus {
    border-color: var(--primary);
    background: white;
    box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
}

body.dark .input-field:focus {
    background: rgba(255,255,255,0.08);
}

textarea.input-field {
    resize: none;
    height: 100px;
}

.custom-select {
    position: relative;
    width: 100%;
}

select.input-field {
    appearance: none;
    cursor: pointer;
}

.actions {
    padding: 1.5rem;
    display: flex;
    gap: 1rem;
    background: transparent;
}

.btn {
    flex: 1;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.btn-primary {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
}

.btn-primary:hover {
    background: var(--primary-dark);
}

.btn-secondary {
    background: rgba(0,0,0,0.05);
    color: var(--text);
}

body.dark .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: white;
}

.btn:active {
    transform: scale(0.98);
}

#toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 0.9rem;
    z-index: 1000;
    transition: transform 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

#toast.show {
    transform: translateX(-50%) translateY(0);
}

#pfp_input {
    display: none;
}

#settings_button {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    z-index: 2;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
}

#settings_button img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
}

#settings_button:hover { transform: scale(1.1); }

#settings_panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 280px;
    height: 100%;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    padding: 25px;
    box-shadow: -5px 0 20px rgba(0,0,0,0.2);
    transform: translateX(100%);
    transition: transform 0.4s ease;
    overflow-y: auto;
    z-index: 3;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

body.dark #settings_panel {
    background: rgba(40,50,70,0.95);
}

#settings_panel.active { transform: translateX(0); }

.sidebar-item {
    padding: 12px 0;
    cursor: pointer;
    font-size: 17px;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    transition: 0.25s;
    font-family: "Times New Roman", serif;
}

.sidebar-item:hover { opacity: 0.7; }

.sidebar-section {
    margin-top: 15px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.sidebar-section label { font-size: 14px; }

.sidebar-section input[type="text"],
.color-picker {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 16px;
    transition: box-shadow 0.3s;
}

.sidebar-section input[type="text"]:focus,
.color-picker:focus { box-shadow: 0 0 10px rgba(0,0,0,0.2); outline: none; }

.switch { position: relative; display: inline-block; width: 50px; height: 26px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
    position: absolute;
    cursor: pointer;
    top:0; left:0; right:0; bottom:0;
    background:#ccc; transition:.4s; border-radius:26px;
}
.slider:before {
    position:absolute; content:""; height:20px; width:20px;
    left:3px; bottom:3px; background:white; transition:.4s; border-radius:50%;
}
input:checked + .slider { background:#4CAF50; }
input:checked + .slider:before { transform: translateX(24px); }

.blur { filter: blur(6px); }

#saveSettings {
    margin-top: 20px;
    padding: 14px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    font-weight: bold;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: transform 0.25s, box-shadow 0.25s;
}

#saveSettings:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

body.dark #saveSettings {
    background: rgba(60,70,90,0.7);
    color: white;
}

#homeBtn {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--primary);
    padding: 5px;
    display: flex;
    align-items: center;
}

#homeBtn:hover {
    transform: scale(1.05);
}
</style>
</head>
<body>

<button id="settings_button">
    <img src="pfp24.jpg" alt="Settings">
</button>

<div id="settings_panel">
    <h3>Settings</h3>
    <div class="sidebar-item" onclick="goTo('account.html')">Account information</div>
    <div class="sidebar-item" onclick="goTo('edit.html')">Edit profile</div>
    <div class="sidebar-item">AI companion name</div>
    <div class="sidebar-section">
        <input type="text" id="aiNameInput" placeholder="Enter AI name">
    </div>
    <div class="sidebar-item" onclick="goTo('updates.html')">Updates</div>
    <div class="sidebar-item" onclick="goTo('regulation.html')">Regulation</div>
    <div class="sidebar-item" onclick="goTo('relaxation.html')">Relaxation exercises</div>
    <div class="sidebar-section">
        <label>Dark Theme</label>
        <label class="switch">
            <input type="checkbox" id="darkToggle">
            <span class="slider"></span>
        </label>
    </div>
    <div class="sidebar-section">
        <label>Background Color</label>
        <input type="color" id="bgColor" class="color-picker">
    </div>
    <button id="saveSettings">Close & Save</button>
</div>

<div id="app-container">
    <header>
        <button id="homeBtn" class="back-btn">←</button>
        <div class="header-title">Edit Profile</div>
        <div style="width: 32px;"></div>
    </header>

    <div class="content">
        <div class="pfp-section">
            <div class="pfp-container" onclick="triggerPfpUpload()">
                <img id="pfp_image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="Profile">
                <div class="pfp-overlay">📷</div>
            </div>
            <input type="file" id="pfp_input" accept="image/*">
            <p style="font-size: 0.8rem; color: var(--text-light); margin-top: 10px;">Tap to change photo</p>
        </div>

        <div class="input-group">
            <label class="input-label">Display Name</label>
            <input type="text" id="edit_name" class="input-field" placeholder="Your Name">
        </div>

        <div class="input-group">
            <label class="input-label">Email Address</label>
            <input type="email" id="edit_email" class="input-field" placeholder="email@example.com">
        </div>

        <div class="input-group">
            <label class="input-label">Bio / Status</label>
            <textarea id="edit_bio" class="input-field" placeholder="Tell us about yourself..."></textarea>
        </div>

        <div class="input-group">
            <label class="input-label">AI Companion Name</label>
            <input type="text" id="edit_ai_name" class="input-field" placeholder="e.g. Buddy">
        </div>

        <div class="input-group">
            <label class="input-label">Membership Plan</label>
            <div class="custom-select">
                <select id="edit_membership" class="input-field">
                    <option value="">No membership</option>
                    <option value="Mind Boost (€10)">Mind Boost (€10)</option>
                    <option value="Inner Balance (€22.99)">Inner Balance (€22.99)</option>
                    <option value="Wellness Pro (€50)">Wellness Pro (€50)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-secondary" onclick="resetForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveProfile()"><span>💾</span> Save Changes</button>
    </div>
</div>

<div id="toast">Profile updated successfully!</div>

<script>
/* ELEMENTS */
const settingsBtn = document.getElementById("settings_button");
const settingsPanel = document.getElementById("settings_panel");
const appContainer = document.getElementById("app-container");
const saveSettings = document.getElementById("saveSettings");
const darkToggle = document.getElementById("darkToggle");
const bgColor = document.getElementById("bgColor");
const aiNameInput = document.getElementById("aiNameInput");

/* SIDEBAR */
settingsBtn.addEventListener("click", () => {
    settingsPanel.classList.toggle("active");
    appContainer.classList.toggle("blur");
});

saveSettings.addEventListener("click", () => {
    settingsPanel.classList.remove("active");
    appContainer.classList.remove("blur");
});

/* DARK MODE */
if (localStorage.getItem("darkMode") === "on") {
    document.body.classList.add("dark");
    darkToggle.checked = true;
}

darkToggle.addEventListener("change", () => {
    if (darkToggle.checked) {
        document.body.classList.add("dark");
        localStorage.setItem("darkMode", "on");
    } else {
        document.body.classList.remove("dark");
        localStorage.setItem("darkMode", "off");
    }
});

/* BACKGROUND COLOR */
const savedColor = localStorage.getItem("bgColor") || "#e0f2f1";
document.body.style.background = `linear-gradient(135deg, ${savedColor} 0%, #fce4ec 100%)`;
bgColor.value = savedColor;

bgColor.oninput = (e) => {
    localStorage.setItem("bgColor", e.target.value);
    document.body.style.background = `linear-gradient(135deg, ${e.target.value} 0%, #fce4ec 100%)`;
};

/* AI NAME */
if (localStorage.getItem("aiName")) {
    aiNameInput.value = localStorage.getItem("aiName");
}

aiNameInput.addEventListener("input", (e) => {
    localStorage.setItem("aiName", e.target.value);
});

/* LOAD SAVED PROFILE DATA */
window.addEventListener("load", () => {
    document.getElementById("edit_name").value = localStorage.getItem("userName") || "";
    document.getElementById("edit_email").value = localStorage.getItem("userEmail") || "";
    document.getElementById("edit_bio").value = localStorage.getItem("userBio") || "";
    document.getElementById("edit_ai_name").value = localStorage.getItem("aiName") || "";

    const saved = localStorage.getItem("membership") || "";
    document.getElementById("edit_membership").value = saved;

    const savedPfp = localStorage.getItem("pfp");
    if (savedPfp) {
        document.getElementById("pfp_image").src = savedPfp;
    }
});

/* SAVE PROFILE */
function saveProfile() {
    localStorage.setItem("userName", document.getElementById("edit_name").value);
    localStorage.setItem("userEmail", document.getElementById("edit_email").value);
    localStorage.setItem("userBio", document.getElementById("edit_bio").value);
    localStorage.setItem("aiName", document.getElementById("edit_ai_name").value);

    const membershipVal = document.getElementById("edit_membership").value;
    if (membershipVal) {
        localStorage.setItem("membership", membershipVal);
    } else {
        localStorage.removeItem("membership");
    }

    showToast();
}

/* TOAST */
function showToast() {
    const toast = document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2500);
}

/* CANCEL */
function resetForm() {
    document.getElementById("edit_name").value = localStorage.getItem("userName") || "";
    document.getElementById("edit_email").value = localStorage.getItem("userEmail") || "";
    document.getElementById("edit_bio").value = localStorage.getItem("userBio") || "";
    const saved = localStorage.getItem("membership") || "";
    document.getElementById("edit_membership").value = saved;
}

/* HOME BUTTON */
document.getElementById("homeBtn").addEventListener("click", () => {
    window.location.href = "index.html";
});

/* NAVIGATION */
function goTo(url) {
    window.location.href = url;
}

/* PFP UPLOAD */
function triggerPfpUpload() {
    document.getElementById("pfp_input").click();
}

document.getElementById("pfp_input").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
        const base64 = event.target.result;
        localStorage.setItem("pfp", base64);
        document.getElementById("pfp_image").src = base64;
    };
    reader.readAsDataURL(file);
});

/* LOAD PFP ON START */
const savedPfp = localStorage.getItem("pfp");
if (savedPfp) {
    document.getElementById("pfp_image").src = savedPfp;
}
</script>

</body>
</html>
