<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Create Account</title>

<style>

body{

margin:0;
font-family:"Segoe UI";
background:#B2EBF2;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

#container{

background:white;

padding:30px;

border-radius:12px;

width:320px;

text-align:center;

box-shadow:0 8px 20px rgba(0,0,0,0.15);

}

input{

width:100%;

padding:12px;

margin:10px 0;

border-radius:6px;

border:1px solid #ccc;

}

button{

width:100%;

padding:12px;

border:none;

border-radius:8px;

cursor:pointer;

font-size:14px;

}

#createBtn{

background:#4CAF50;

color:white;

}

#googleBtn{

background:#4285F4;

color:white;

margin-top:10px;

}

</style>

</head>

<body>

<div id="container">

<h2>Sign into your account</h2>

<input
type="email"
id="email"
placeholder="Enter your email"
>

<button id="createBtn">
Sign in
</button>
</div>

</body>

</html>
<script>
document.getElementById('loginBtn').addEventListener('click',()=>{
    const email = document.getElementById('email').value.trim();
    const stored = localStorage.getItem('userEmail');
    if(email===stored){
        alert('Login successful!');
        window.location.href='index.html';
    }else{
        alert('Account not found!');
    }
});
</script>
</body>
</html>
